services:
  postgres:
    image: postgres:15-alpine
    container_name: syncra-postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: ${DB_USER:-syncra}
      POSTGRES_PASSWORD: ${DB_PASS:-syncra123}
      POSTGRES_DB: ${DB_NAME:-syncra}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-syncra} -d ${DB_NAME:-syncra}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: syncra-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
